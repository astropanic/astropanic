name: Metrics
on:
  schedule: [{ cron: "30 * * * *" }]
  workflow_dispatch:
  push: { branches: ["main"] }

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Complete Metrics Dashboard
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: astropanic
          template: classic
          config_timezone: Europe/Berlin
          
          # Core Sections
          base: header, activity, community, repositories
          repositories_affiliations: owner
          
          # Plugin: Achievements (Bypassing the broken Projects API)
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 0
          plugin_achievements_ignored: master, packer, worker, member, projects # 'projects' skips the deprecated classic endpoints
          
          # Plugin: Lines of Code
          plugin_lines: yes
          
          # Plugin: ISO Calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # Plugin: Languages (Solid fallback to show coding insights)
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          
          # Plugin: Follow-up
          plugin_followup: yes
